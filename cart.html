<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault | Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100">
  <header class="sticky top-0 z-30 border-b border-slate-800 bg-slate-950/95 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <div>
        <h1 class="text-2xl font-semibold">GameVault</h1>
        <p class="text-sm text-slate-400">Your Cart</p>
      </div>
      <a href="index.html" class="rounded-lg bg-purple-600  px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-600">Store</a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <section class="rounded-xl bg-slate-800 p-6 shadow-lg shadow-black/40">
      <div class="space-y-4">
        <h2 class="text-3xl font-bold">Review your cart</h2>
        <p class="text-slate-300">Update quantities, remove items, and place your order when you are ready.</p>
      </div>
    </section>

    <section class="mt-8 grid gap-6 lg:grid-cols-[2fr_1fr]">
      <div id="cartItems" class="space-y-4"></div>
      <div class="rounded-xl bg-slate-800 p-6 shadow-lg shadow-black/40">
        <h3 class="text-xl font-semibold">Order summary</h3>
        <p class="mt-2 text-slate-400">Total price for selected games.</p>
        <div id="cartTotal" class="mt-6 text-4xl font-bold text-blue-400">$0.00</div>
        <button id="orderButton" class="mt-8 w-full rounded-lg bg-purple-600  px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-600">Order</button>
      </div>
    </section>
  </main>



  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
